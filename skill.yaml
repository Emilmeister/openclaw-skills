name: openclaw-skills
version: "1.0.0"
description: Agent-agnostic Python CLI skills for Cloud.ru cloud services.

risk_tier: medium

permissions:
  network:
    - "https://iam.api.cloud.ru/*"
    - "https://console.cloud.ru/*"
    - "https://foundation-models.api.cloud.ru/*"
    - "https://managed-rag.api.cloud.ru/*"
    - "https://*.managed-rag.inference.cloud.ru/*"
    - "https://*.modelrun.inference.cloud.ru/*"
    - "https://s3.cloud.ru/*"
  filesystem:
    read:
      - ".env"
      - "~/.openclaw/"
    write:
      - "~/.openclaw/"
  environment:
    - CP_CONSOLE_KEY_ID
    - CP_CONSOLE_SECRET
    - PROJECT_ID
    - CLOUD_RU_FOUNDATION_MODELS_API_KEY
    - CLOUDRU_ENV_FILE
  subprocess:
    - python3

skills:
  cloudru-account-setup:
    entry_points:
      - scripts/browser_login.py
      - scripts/cloudru_account_bootstrap.py
    tools:
      - name: browser-login
        description: Open Cloud.ru console in browser, extract token and project info.
        annotations:
          destructiveness: low
          idempotent: true
      - name: bootstrap
        description: Create service account, API key, and access key for Cloud.ru project.
        annotations:
          destructiveness: medium
          idempotent: false

  cloudru-foundation-models:
    entry_points:
      - scripts/fm.py
    tools:
      - name: models
        description: List available foundation models.
        annotations:
          destructiveness: none
          read_only: true
      - name: call
        description: Call chat completions on a foundation model.
        annotations:
          destructiveness: none
          read_only: true

  cloudru-ml-inference:
    entry_points:
      - scripts/ml_inference.py
    tools:
      - name: catalog
        description: List predefined models from the ML Inference catalog.
        annotations:
          destructiveness: none
          read_only: true
      - name: deploy
        description: Deploy a model from the catalog.
        annotations:
          destructiveness: medium
          idempotent: false
      - name: create
        description: Create a custom model run.
        annotations:
          destructiveness: medium
          idempotent: false
      - name: delete
        description: Delete a model run.
        annotations:
          destructiveness: high
          idempotent: true

  cloudru-vm:
    entry_points:
      - scripts/vm.py
    tools:
      - name: create
        description: Create a virtual machine.
        annotations:
          destructiveness: medium
          idempotent: false
      - name: delete
        description: Delete a virtual machine.
        annotations:
          destructiveness: high
          idempotent: true
      - name: list
        description: List virtual machines.
        annotations:
          destructiveness: none
          read_only: true

  cloudru-managed-rag:
    entry_points:
      - scripts/managed_rag.py
    tools:
      - name: setup
        description: Set up Managed RAG infrastructure (S3 bucket, KB, upload docs).
        annotations:
          destructiveness: medium
          idempotent: false
      - name: search
        description: Search a knowledge base.
        annotations:
          destructiveness: none
          read_only: true
      - name: ask
        description: Retrieve and generate an answer from a knowledge base.
        annotations:
          destructiveness: none
          read_only: true
